version: 2

sources:
  - name: thelook_ecommerce
    description: "Bronze layer in BigQuery (streaming tables + external parquet tables on GCS)."
    database: "{{ env_var('GCP_PROJECT_ID', 'cloud-data-project-492514') }}"
    schema: thelook_staging
    # Default freshness thresholds (overridden per-table where needed)
    # bigquery_use_batch_source_freshness=true in dbt_project.yml means dbt uses
    # TABLE_STORAGE last_modified_time — no loaded_at_field needed for INT-typed columns.
    config:
      freshness:
        warn_after: {count: 2, period: hour}
        error_after: {count: 12, period: hour}
    tables:
      - name: users
        description: "Raw user records from the source system."

      - name: products
        description: "Raw product catalog records captured via CDC."
        config:
          freshness:
            warn_after: {count: 24, period: hour}   # Products change infrequently
            error_after: {count: 72, period: hour}

      - name: distribution_centers
        description: "Distribution center master data (static, rarely changes)."
        identifier: dist_centers
        config:
          freshness: null  # Disable freshness check — static reference table

      - name: inventory_items
        description: "Inventory item lifecycle records."

      - name: orders
        description: "Raw order header records captured via CDC."
        config:
          freshness:
            warn_after: {count: 6, period: hour}
            error_after: {count: 24, period: hour}

      - name: order_items
        description: "Raw order line records captured via CDC."
        config:
          freshness:
            warn_after: {count: 6, period: hour}
            error_after: {count: 24, period: hour}

      - name: events
        description: "Raw digital event stream."
        config:
          freshness:
            warn_after: {count: 12, period: hour}
            error_after: {count: 24, period: hour}
