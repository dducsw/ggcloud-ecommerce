services:
  postgres-source:
    image: postgres:15
    container_name: postgres-source
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: thelook_db
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/cdc/init/01-create-demo-schema.sql:/docker-entrypoint-initdb.d/01-create-demo-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_user -d thelook_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  datagen:
    build:
      context: ./
      dockerfile: datagen/thelook-ecomm/Dockerfile
    container_name: ggcloud_datagen
    profiles:
      - manual
    depends_on:
      postgres-source:
        condition: service_healthy
    command: >
      python generator.py
      --db-host postgres-source
      --db-user db_user
      --db-password db_password
      --db-name thelook_db
      --db-schema demo
      --avg-qps 5
      --init-num-users 1000
      --max-iter -1
    restart: "no"

  debezium-server:
    image: debezium/server:2.6
    container_name: debezium-server
    depends_on:
      postgres-source:
        condition: service_healthy
    volumes:
      - ./infra/cdc/debezium-server/conf:/debezium/conf:ro
      - ./infra/cdc/debezium-server/data:/debezium/data
      - ./credentials/gcp-key.json:/debezium/gcp-key.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/debezium/gcp-key.json
    restart: unless-stopped

volumes:
  postgres_data:
