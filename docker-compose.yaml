services:
  postgres-source:
    image: postgres:15
    container_name: postgres-source
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: thelook_db
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/cdc/init/01-create-demo-schema.sql:/docker-entrypoint-initdb.d/01-create-demo-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_user -d thelook_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  datagen:
    build:
      context: ./datagen/thelook-ecomm
      dockerfile: Dockerfile
    container_name: ggcloud_datagen
    depends_on:
      postgres-source:
        condition: service_healthy
    command: >
      python generator.py
      --db-host postgres-source
      --db-user db_user
      --db-password db_password
      --db-name thelook_db
      --db-schema demo
      --avg-qps 5
      --init-num-users 1000
      --max-iter -1
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.7.1
    container_name: ggcloud_kafka
    hostname: kafka
    ports:
      - "29092:29092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
    healthcheck:
      test: ["CMD", "bash", "-lc", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  debezium-cdc:
    image: debezium/connect:2.6
    container_name: debezium-cdc
    depends_on:
      kafka:
        condition: service_healthy
      postgres-source:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: connect-cluster
      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-status
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_REST_ADVERTISED_HOST_NAME: debezium-cdc
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1

  debezium-server:
    image: debezium/server:2.6
    container_name: debezium-server
    depends_on:
      postgres-source:
        condition: service_healthy
    volumes:
      - ./infra/cdc/debezium-server/conf:/debezium/conf:ro
      - ./infra/cdc/debezium-server/data:/debezium/data
      - ./credentials/gcp-key.json:/debezium/gcp-key.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/debezium/gcp-key.json
    restart: unless-stopped

volumes:
  postgres_data:
